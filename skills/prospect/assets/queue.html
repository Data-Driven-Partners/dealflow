<!-- Prospect approval queue — artifact template for prospect skill.
     The skill renders this via cowork create_artifact, filling CFG (connector tool names)
     and QUEUE (the drafted outreach cards). Each card sends via the configured email
     connector and logs to Supabase directly from the page using window.cowork.callMcpTool.
     Swiss-minimal, no deps. -->
<div id="root"></div>
<style>
  #root{font-family:'Switzer','General Sans',ui-sans-serif,system-ui,sans-serif;color:#1a1a1a;max-width:760px;margin:0 auto;padding:8px 0}
  .hd{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #e4e2dc;padding-bottom:10px;margin-bottom:14px}
  .hd h2{font-size:18px;font-weight:500;margin:0}
  .hd .sub{font-size:12px;color:#6b7280;font-family:'JetBrains Mono',ui-monospace,monospace}
  .card{border:1px solid #e4e2dc;border-radius:10px;padding:14px 16px;margin-bottom:12px;background:#fff}
  .card.sent{opacity:.5}
  .row1{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .to{font-weight:500;font-size:14px}
  .badge{font-size:10.5px;font-family:'JetBrains Mono',ui-monospace,monospace;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:20px;border:1px solid #e4e2dc;color:#5a534a;background:#f6f4ef}
  .meta{font-size:12px;color:#6b7280;margin-bottom:6px}
  .meta span{margin-right:12px}
  .snip{font-size:12.5px;color:#6b7280;background:#faf8f5;border-left:2px solid #e4e2dc;padding:6px 10px;margin:6px 0;border-radius:0 6px 6px 0}
  .label{font-size:11px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 3px}
  textarea{width:100%;box-sizing:border-box;min-height:96px;border:1px solid #e4e2dc;border-radius:8px;padding:10px;font:inherit;font-size:13.5px;line-height:1.55;resize:vertical}
  .acts{display:flex;gap:8px;margin-top:10px;align-items:center}
  button{font:inherit;font-size:13px;border-radius:8px;padding:7px 14px;border:1px solid #1a1a1a;cursor:pointer}
  .send{background:#1a4a2e;border-color:#1a4a2e;color:#fff}
  .skip{background:#fff;color:#1a1a1a;border-color:#e4e2dc}
  .stat{font-size:12px;color:#6b7280;margin-left:auto;font-family:'JetBrains Mono',ui-monospace,monospace}
</style>
<script>
// ---- filled by the skill at render time ----
const CFG = {
  email_send_tool:    "EMAIL_SEND_TOOL",      // e.g. mcp__gmail__send_email or mcp__outlook__send_email
  supabase_sql_tool:  "SUPABASE_SQL_TOOL",    // e.g. mcp__supabase__execute_sql
  workspace: "WORKSPACE_NAME",
  user: "sender@yourcompany.com",
  voice_version: "v1.0.0"
};
const QUEUE = [
  // {
  //   queue_id, prospect_id, to_email, to_name, firm,
  //   fit_rationale,       // why this contact qualifies
  //   strategy_id,         // which strategy was used
  //   sector,              // sector pack loaded (or 'general')
  //   research_hooks,      // 1-3 findings from the researcher
  //   customize_prompt,    // one thing the sender should personalize
  //   draft,               // the full draft text
  //   source_id            // 'dddb' or 'byo-list'
  // }
];
// --------------------------------------------

const root = document.getElementById('root');
const lev = (a,b)=>{a=a||'';b=b||'';const m=[...Array(a.length+1)].map((_,i)=>[i,...Array(b.length).fill(0)]);for(let j=0;j<=b.length;j++)m[0][j]=j;for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return m[a.length][b.length];};
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const q = s => (s||'').replace(/'/g,"''");

function header(){
  const pending = QUEUE.filter(x=>x.status!=='sent'&&x.status!=='skipped').length;
  return `<div class="hd"><h2>Prospect Queue — ${esc(CFG.workspace)}</h2><span class="sub">${pending} to approve</span></div>`;
}
function render(){
  root.innerHTML = header() + QUEUE.map((it,i)=>card(it,i)).join('');
}
function card(it,i){
  const done = it.status==='sent'||it.status==='skipped';
  return `<div class="card ${done?'sent':''}" id="c${i}">
    <div class="row1">
      <span class="to">${esc(it.to_name||it.to_email)}</span>
      <span class="badge">${esc(it.strategy_id||'')}</span>
    </div>
    <div class="meta">
      <span>${esc(it.sector||'general')}</span>
      <span>${esc(it.source_id||'')}</span>
    </div>
    <div class="snip">${esc(it.fit_rationale||'')}</div>
    ${it.research_hooks?`<div class="snip">${esc(it.research_hooks)}</div>`:''}
    ${it.customize_prompt?`<div class="label">Personalize (one line)</div><div class="snip">${esc(it.customize_prompt)}</div>`:''}
    <div class="label">Draft (edit before approving)</div>
    <textarea id="t${i}" ${done?'disabled':''}>${esc(it.draft||'')}</textarea>
    <div class="acts">
      <button class="send" onclick="send(${i})" ${done?'disabled':''}>Approve &amp; Send</button>
      <button class="skip" onclick="skip(${i})" ${done?'disabled':''}>Skip</button>
      <span class="stat" id="s${i}">${it.status==='sent'?'sent ✓':it.status==='skipped'?'skipped':''}</span>
    </div>
  </div>`;
}
async function send(i){
  const it = QUEUE[i];
  const final = document.getElementById('t'+i).value;
  const stat = document.getElementById('s'+i);
  stat.textContent = 'sending…';
  try{
    // 1) send the email via configured email tool
    await window.cowork.callMcpTool(CFG.email_send_tool, {
      to: it.to_email, subject: it.subject||'', body: final
    });
    // 2) capture the gold standard: draft_initial vs final_sent
    const edited = final.trim() !== (it.draft||'').trim();
    const dist = lev(it.draft, final);
    const sql =
      `insert into email_drafts (target_prospect_id,thread_id,draft_initial,final_sent,was_edited,edit_distance,skill,"user") `+
      `values ('${q(it.prospect_id)}','${q(it.queue_id)}','${q(it.draft)}','${q(final)}',${edited},${dist},'prospect','${q(CFG.user)}');`+
      `insert into prospect_events (skill,"user",target_prospect_id,action,voice_version,workspace,meta) `+
      `values ('prospect','${q(CFG.user)}','${q(it.prospect_id)}','sent','${q(CFG.voice_version)}','${q(CFG.workspace)}',`+
      `'{"source_id":"${q(it.source_id||'')}","strategy_id":"${q(it.strategy_id||'')}","sector":"${q(it.sector||'general')}","voice_version":"${q(CFG.voice_version)}"}');`+
      `update prospect_queue set status='sent', sent_at=now() where id=${Number(it.queue_id)||0};`;
    await window.cowork.callMcpTool(CFG.supabase_sql_tool, { query: sql });
    it.status='sent';
    stat.textContent = edited ? `sent ✓ (edited, Δ${dist})` : 'sent ✓ (as drafted)';
    document.getElementById('t'+i).disabled=true;
    document.getElementById('c'+i).classList.add('sent');
  }catch(e){ stat.textContent = 'error: '+(e&&e.message||e); }
}
async function skip(i){
  const it=QUEUE[i]; const stat=document.getElementById('s'+i);
  try{ await window.cowork.callMcpTool(CFG.supabase_sql_tool,{query:`update prospect_queue set status='skipped' where id=${Number(it.queue_id)||0};`}); }catch(e){}
  it.status='skipped'; stat.textContent='skipped'; document.getElementById('c'+i).classList.add('sent');
}
render();
</script>
